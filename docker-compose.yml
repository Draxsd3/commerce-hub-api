version: "3.9"

services:
  api:
    build: .
    container_name: api-flasgger-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/api_flasgger}
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-5000}
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: api-flasgger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_flasgger}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

volumes:
  postgres_data:

